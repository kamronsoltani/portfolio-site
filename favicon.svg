<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Block shadow (matches .brand::after chip) -->
  <rect x="11" y="13" width="17" height="13" rx="3" fill="#7a543a"/>
  <!-- Car body -->
  <rect x="9" y="11" width="17" height="13" rx="3" fill="url(#trainBody)" stroke="#7f583e" stroke-width="2"/>
  <!-- Vertical window line -->
  <path d="M17.5 13.25v9.5" stroke="#7f583e" stroke-width="1.25" stroke-linecap="square"/>
  <!-- Orange stripe -->
  <rect x="11.75" y="14.75" width="11.5" height="6" rx="1" fill="url(#trainStripe)"/>
  <defs>
    <linearGradient id="trainBody" x1="9" y1="11" x2="9" y2="24">
      <stop offset="0%" stop-color="#eee8e2"/>
      <stop offset="100%" stop-color="#cfc4ba"/>
    </linearGradient>
    <linearGradient id="trainStripe" x1="11.75" y1="14.75" x2="11.75" y2="20.75">
      <stop offset="0%" stop-color="#de7b34"/>
      <stop offset="52%" stop-color="#b85c28"/>
      <stop offset="100%" stop-color="#b9632e"/>
    </linearGradient>
  </defs>
</svg>
